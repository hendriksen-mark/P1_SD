; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = esp32c3

[common]
; Device configuration
device_name = P1_SD
; Reduce CPU frequency to save power (240MHz -> 160MHz)
; Change to 80 for even more power savings if performance is adequate
board_build.f_cpu = 160000000L
build_unflags = -std=gnu++11
build_flags =
	-DARDUINO_USB_MODE=1
  	-DARDUINO_USB_CDC_ON_BOOT=1
	-std=gnu++2a
	-Os
	-DCORE_DEBUG_LEVEL=0
	-ffunction-sections
	-fdata-sections
	-Wl,--gc-sections
	; Change to LVL_ERROR for production (saves 3-5KB flash)
	; Change to LVL_TRACE for debugging
	-DDEBUGLOG_DEFAULT_LOG_LEVEL_TRACE
	-DDEBUGLOG_ENABLE_FILE_LOGGER
	-DDEBUGLOG_DEFAULT_FILE_LEVEL_ERROR
	-DDEVICE_NAME=\"${common.device_name}\"
	-DUSE_SD
lib_deps =
	hideakitai/DebugLog@^0.8.4
	bblanchon/ArduinoJson @ ^7.2.1
	makuna/NeoPixelBus @ ^2.8.4
	tzapu/WiFiManager@^2.0.17
upload_protocol = espota
upload_port = ${common.device_name}.local
monitor_speed = 115200

[env:esp32c3]
platform = espressif32
board = esp32-c3-m1i-kit
framework = arduino
board_build.f_cpu = ${common.board_build.f_cpu}
build_unflags = ${common.build_unflags}
lib_deps =
    ${common.lib_deps}
build_flags =
	-DINFO_DATA_PIN=3 ; On ESP32-C3 Supper Mini, no built-in RGB LED, use GPIO3 for external info LED
	-DINFO_LED_ORDER=Grb
	${common.build_flags}
upload_protocol = ${common.upload_protocol}
upload_port = ${common.upload_port}
monitor_speed = ${common.monitor_speed}
